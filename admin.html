<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>레고에듀케이션 STEAMedu 청라센터 관리자</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="admin-locked">
  <div class="admin-lock" id="adminLock">
    <form class="admin-lock-box" id="adminLockForm">
      <div class="eyebrow">Administrator</div>
      <h1>관리자 인증</h1>
      <p>비밀번호를 입력하면 선택한 그룹의 랭킹 관리 화면으로 이동합니다.</p>
      <input id="adminPassword" type="password" inputmode="numeric" autocomplete="current-password" placeholder="비밀번호" autofocus>
      <button class="primary" type="submit">입장하기</button>
      <div class="admin-lock-error" id="adminLockError" role="alert"></div>
    </form>
  </div>

  <div class="app">
    <header>
      <div class="header-inner">
        <div>
          <div class="eyebrow">Score Operations</div>
          <h1>레고에듀케이션 STEAMedu 청라센터</h1>
          <div class="sub"><strong id="groupLabel">STEAM-L2 1Gr</strong> 참가자 이름과 라운드별 점수를 관리합니다.</div>
        </div>
        <div class="actions">
          <a class="button" id="homeLink" href="./index.html">그룹 선택</a>
          <a class="button" id="studentLink" href="./student.html">학생용 보기</a>
          <button id="copyStudentLink">학생 링크 복사</button>
          <button id="exportJson">내보내기</button>
          <button id="importJson">불러오기</button>
          <button id="exportCsv">CSV</button>
          <button class="danger" id="resetAll">초기화</button>
          <input class="file-input" id="fileInput" type="file" accept="application/json">
        </div>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar panel">
        <div class="section">
          <span class="label">보기</span>
          <div class="tabs">
            <button class="tab active" data-view="overall">합산 순위</button>
            <button class="tab" data-view="round">점수 입력</button>
          </div>
        </div>

        <div class="section">
          <span class="label">라운드 선택</span>
          <div class="round-grid" id="roundButtons"></div>
        </div>

        <div class="section">
          <span class="label">현황</span>
          <div class="stat-grid">
            <div class="stat"><strong id="activePlayers">0</strong><span>등록 참가자</span></div>
            <div class="stat"><strong id="filledScores">0</strong><span>입력 점수</span></div>
            <div class="stat"><strong id="topName">-</strong><span>현재 1위</span></div>
            <div class="stat"><strong id="topScore">0</strong><span>1위 총점</span></div>
          </div>
        </div>

        <div class="section">
          <span class="label">참가자 이름 입력</span>
          <div class="form-row">
            <select id="playerSelect"></select>
            <button id="nameFocus">선택</button>
          </div>
          <div style="height: 8px"></div>
          <input id="nameInput" placeholder="이름을 입력하세요">
          <div style="height: 8px"></div>
          <button class="primary" id="nameSave">이름 저장</button>
        </div>

        <div class="section">
          <span class="label">참가자 목록</span>
          <div class="name-list" id="nameList"></div>
        </div>
      </aside>

      <section class="content">
        <div class="toolbar">
          <input id="searchInput" placeholder="참가자 검색">
          <select id="sortMode">
            <option value="rank">순위순</option>
            <option value="name">이름순</option>
            <option value="score">점수순</option>
          </select>
          <button id="clearRound">라운드 비우기</button>
        </div>

        <div class="panel">
          <div class="section table-title">
            <strong id="viewTitle">합산 순위</strong>
            <span class="sub" id="viewSubtitle">이름이 입력된 참가자만 순위에 표시됩니다.</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="./firebase-config.js"></script>
  <script src="./ranking-core.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
